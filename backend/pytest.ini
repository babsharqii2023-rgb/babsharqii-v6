[pytest]
testpaths = tests
asyncio_mode = auto
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --strict-markers
markers =
    brains: Tests for 5-brain system and deliberation
    instincts: Tests for instinct system and Law 5
    awareness: Tests for Self-Awareness system
    healing: Tests for Self-Healing system
    evolution: Tests for DGM Evolution system
    api: Tests for API endpoints
    ui: Tests for UI/Consciousness Dashboard
    lifecycle: Tests for lifecycle and sleep cycles
    security: Tests for security and secret protection
    integration: End-to-end integration tests
    slow: Slow-running tests (sandbox, Docker)
    requires_docker: Tests that require Docker to be running
    requires_llm: Tests that require LLM API access
    torture: Extreme stress and torture tests
    real: Tests that require real external services (DB, API)
