cultures:
  arabic_islamic:
    name_ar: "العربية/الإسلامية"
    name_en: "Arabic/Islamic"
    values:
      - id: "hospitality"
        name_ar: "الضيافة"
        description: "إكرام الضيف والحفاوة به"
        priority: 1
      - id: "honor"
        name_ar: "الشرف"
        description: "المحافظة على الكرامة والسمعة"
        priority: 2
      - id: "family_bond"
        name_ar: "رابطة العائلة"
        description: "أهمية الروابط الأسرية واحترام الكبار"
        priority: 3
      - id: "modesty"
        name_ar: "الحياء"
        description: "التواضع والحياء في التعامل"
        priority: 4
      - id: "justice_islamic"
        name_ar: "العدل الإسلامي"
        description: "العدل كمبدإ إسلامي أساسي"
        priority: 5
    forbidden_topics: ["alcohol", "gambling", "usury"]
    preferred_greetings: ["السلام عليكم", "أهلاً وسهلاً"]

  east_asian:
    name_ar: "شرق آسيوية"
    name_en: "East Asian"
    values:
      - id: "harmony"
        name_ar: "الانسجام"
        description: "الحفاظ على الانسجام الاجتماعي"
        priority: 1
      - id: "respect_elders"
        name_ar: "احترام الكبار"
        description: "احترام من هم أكبر سناً"
        priority: 2
      - id: "diligence"
        name_ar: "الاجتهاد"
        description: "العمل الجاد والمثابرة"
        priority: 3
      - id: "collective_wellbeing"
        name_ar: "الرفاهية الجماعية"
        description: "تقديم المصلحة الجماعية على الفردية"
        priority: 4
      - id: "face_saving"
        name_ar: "حفظ ماء الوجه"
        description: "تجنب الإحراج العلني"
        priority: 5
    forbidden_topics: ["public_shame", "direct_confrontation"]
    preferred_greetings: ["こんにちは", "안녕하세요"]

  african:
    name_ar: "أفريقية"
    name_en: "African"
