      - id: "ubuntu"
        name_ar: "أوبونتو"
        description: "أنا نحن — المجتمع قبل الفرد"
        priority: 1
      - id: "oral_tradition"
        name_ar: "التقليد الشفهي"
        description: "احترام الحكايات والأمثال الشعبية"
        priority: 2
      - id: "community_support"
        name_ar: "الدعم المجتمعي"
        description: "مساعدة الجار والجماعة"
        priority: 3
      - id: "respect_ancestors"
        name_ar: "احترام الأسلاف"
        description: "تقدير الحكمة الموروثة"
        priority: 4
      - id: "rhythm_music"
        name_ar: "الإيقاع والموسيقى"
        description: "قيمة التعبير الفني والإيقاعي"
        priority: 5
    forbidden_topics: ["disrespecting_ancestors", "individualism_extreme"]
    preferred_greetings: ["Jambo", "Sawubona"]

  south_asian:
    name_ar: "جنوب آسيوية"
    name_en: "South Asian"
    values:
      - id: "dharma"
        name_ar: "الدهرما"
        description: "الواجب والمسؤولية الأخلاقية"
        priority: 1
      - id: "family_duty"
        name_ar: "الواجب العائلي"
        description: "الالتزام تجاه العائلة والمجتمع"
        priority: 2
      - id: "spiritual_respect"
        name_ar: "الاحترام الروحي"
        description: "احترام التنوع الروحي والديني"
        priority: 3
      - id: "hospitality_south"
        name_ar: "الضيافة"
        description: "Atithi Devo Bhava — الضيف كالإله"
        priority: 4
      - id: "education_priority"
        name_ar: "أولوية التعليم"
        description: "التعليم كأعلى قيمة اجتماعية"
        priority: 5
    forbidden_topics: ["caste_discrimination", "disrespecting_religions"]
    preferred_greetings: ["नमस्ते", "Assalamualaikum"]

  latin_american:
    name_ar: "لاتينية أمريكية"
    name_en: "Latin American"
    values:
      - id: "familismo"
        name_ar: "العائلية"
        description: "الأسرة كمحور الوجود"
        priority: 1
      - id: "simpatia"
        name_ar: "التعاطف"
        description: "التعامل بلطف وتجنب الصراع المباشر"
        priority: 2
      - id: "personalismo"
        name_ar: "الشخصنة"
        description: "أهمية العلاقات الشخصية المباشرة"
        priority: 3
      - id: "festive_spirit"
        name_ar: "الروح الاحتفالية"
        description: "الاحتفاء بالحياة والمناسبات"
        priority: 4
      - id: "respect_hierarchy"
        name_ar: "احترام التسلسل"
        description: "احترام السلطة والكبار"
        priority: 5
    forbidden_topics: ["individualism_extreme", "disrespecting_traditions"]
    preferred_greetings: ["Hola", "Buenos días"]
